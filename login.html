<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Uncle Brew's — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bean"></div>
  <div class="bean"></div>
  <div class="bean"></div>
  <div class="bean"></div>
  <div class="bean"></div>

  <div class="card">

    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20h36l-4 24H14L10 20z"/>
          <path d="M46 24h6a6 6 0 0 1 0 12h-6" fill="none" stroke="#c8922a" stroke-width="3" stroke-linecap="round"/>
          <rect x="8" y="46" width="40" height="4" rx="2"/>
          <path d="M22 14 Q24 10 26 14" fill="none" stroke="#c8922a" stroke-width="2" stroke-linecap="round"/>
          <path d="M30 12 Q32 7 34 12" fill="none" stroke="#c8922a" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brand-name">Uncle Brew's</div>
      <div class="brand-sub">Management System</div>
    </div>

    <div class="divider"><span>Sign in</span></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button class="btn-login">Login</button>

    <div class="footer-note">
      Uncle Brew's Café &nbsp;·&nbsp; <span>Staff Portal</span>
    </div>

  </div>

</body>
</html>
